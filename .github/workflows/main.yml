name: Build NMDLock APK
 
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
 
      - name: Download gradle-wrapper.jar (if missing)
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -sSLo android/gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          fi
 
      - name: Grant execute permission & Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
 
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NMDLock-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
